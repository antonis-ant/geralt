services:
  app:
    image: fireflyiii/core:latest
    hostname: app
    container_name: firefly_iii_core
    restart: always
    volumes:
      - /srv/appdata/firefly/app/upload:/var/www/html/storage/upload
    networks:
      - firefly_iii
    ports:
      - "8081:8080"
    depends_on:
      - db
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SITE_OWNER: user@example.com
      APP_KEY: 
      DEFAULT_LANGUAGE: el_GR
      DEFAULT_LOCALE: el_GR
      TZ: Europe/Athens
      TRUSTED_PROXIES: "**"
      LOG_CHANNEL: stack
      APP_LOG_LEVEL: notice
      AUDIT_LOG_LEVEL: emergency
      AUDIT_LOG_CHANNEL: ""

      PAPERTRAIL_HOST: ""
      PAPERTRAIL_PORT: ""

      APP_URL: http://localhost:8081

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: firefly
      DB_USERNAME: firefly
      DB_PASSWORD: 'password'
      DB_SOCKET: ""

      PGSQL_SSL_MODE: disable
      PGSQL_SSL_ROOT_CERT: ""
      PGSQL_SSL_CERT: ""
      PGSQL_SSL_KEY: ""
      PGSQL_SSL_CRL_FILE: ""
      PGSQL_SCHEMA: firefly

      CACHE_DRIVER: file
      SESSION_DRIVER: file
      REDIS_SCHEME: tcp
      REDIS_PATH: ""
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_CACHE_DB: "1"

      COOKIE_PATH: "/"
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax

      MAIL_MAILER: log
      MAIL_HOST: ""
      MAIL_PORT: "2525"
      MAIL_FROM: changeme@example.com
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_ENCRYPTION: ""
      MAIL_SENDMAIL_COMMAND: ""
      MAIL_ALLOW_SELF_SIGNED: "false"
      MAIL_VERIFY_PEER: "true"
      MAIL_VERIFY_PEER_NAME: "true"
      MAILGUN_DOMAIN: ""
      MAILGUN_SECRET: ""
      MAILGUN_ENDPOINT: api.eu.mailgun.net
      MANDRILL_SECRET: ""
      SPARKPOST_SECRET: ""
      MAILERSEND_API_KEY: ""

      SEND_ERROR_MESSAGE: "true"
      MAP_DEFAULT_LAT: ""
      MAP_DEFAULT_LONG: ""
      MAP_DEFAULT_ZOOM: "6"
      AUTHENTICATION_GUARD: web
      AUTHENTICATION_GUARD_HEADER: REMOTE_USER
      AUTHENTICATION_GUARD_EMAIL: ""
      PASSPORT_PRIVATE_KEY: ""
      PASSPORT_PUBLIC_KEY: ""
      CUSTOM_LOGOUT_URL: ""
      DISABLE_FRAME_HEADER: "false"
      DISABLE_CSP_HEADER: "false"
      TRACKER_SITE_ID: ""
      TRACKER_URL: ""

      STATIC_CRON_TOKEN: 'any 32-character token'
      DKR_CHECK_SQLITE: "true"

      APP_NAME: FireflyIII
      BROADCAST_DRIVER: log
      QUEUE_DRIVER: sync
      CACHE_PREFIX: firefly
      PUSHER_KEY: ""
      IPINFO_TOKEN: ""
      PUSHER_SECRET: ""
      PUSHER_ID: ""
      DEMO_USERNAME: ""
      DEMO_PASSWORD: ""

      FIREFLY_III_LAYOUT: v1

  db:
    image: postgres:16
    hostname: db
    container_name: firefly_iii_db
    restart: always
    networks:
      - firefly_iii
    volumes:
      - /srv/appdata/firefly/db:/var/lib/postgresql/data
      - /srv/appdata/firefly/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: firefly
      POSTGRES_DB: firefly
      POSTGRES_PASSWORD: 'password'

  cron:
    image: alpine
    restart: always
    container_name: firefly_iii_cron
    environment:
      TZ: Europe/Athens
      STATIC_CRON_TOKEN: 'any 32-character token'
    command: >
      sh -c "apk add --no-cache tzdata &&
      (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) &&
      echo '0 3 * * * wget -qO- http://app:8080/api/v1/cron/$$STATIC_CRON_TOKEN; echo' | crontab - &&
      crond -f -L /dev/stdout"
    networks:
      - firefly_iii
    depends_on:
      - app

networks:
  firefly_iii:
    driver: bridge