services:
  app:
    image: fireflyiii/core:latest
    hostname: app
    container_name: firefly_iii_core
    restart: always
    volumes:
      - firefly_iii_upload:/var/www/html/storage/upload
    networks:
      - firefly_iii
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      - db
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      SITE_OWNER: ${SITE_OWNER}
      APP_KEY: ${APP_KEY}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE}
      TZ: ${TZ}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
      LOG_CHANNEL: ${LOG_CHANNEL}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL}
      AUDIT_LOG_LEVEL: ${AUDIT_LOG_LEVEL}
      AUDIT_LOG_CHANNEL: ${AUDIT_LOG_CHANNEL}
      PAPERTRAIL_HOST: ${PAPERTRAIL_HOST}
      PAPERTRAIL_PORT: ${PAPERTRAIL_PORT}
      APP_URL: ${APP_URL}

      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SOCKET: ${DB_SOCKET}

      PGSQL_SSL_MODE: ${PGSQL_SSL_MODE}
      PGSQL_SSL_ROOT_CERT: ${PGSQL_SSL_ROOT_CERT}
      PGSQL_SSL_CERT: ${PGSQL_SSL_CERT}
      PGSQL_SSL_KEY: ${PGSQL_SSL_KEY}
      PGSQL_SSL_CRL_FILE: ${PGSQL_SSL_CRL_FILE}
      PGSQL_SCHEMA: ${PGSQL_SCHEMA}

      CACHE_DRIVER: ${CACHE_DRIVER}
      SESSION_DRIVER: ${SESSION_DRIVER}
      REDIS_SCHEME: ${REDIS_SCHEME}
      REDIS_PATH: ${REDIS_PATH}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB}

      COOKIE_PATH: ${COOKIE_PATH}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}

      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_SENDMAIL_COMMAND: ${MAIL_SENDMAIL_COMMAND}
      MAIL_ALLOW_SELF_SIGNED: ${MAIL_ALLOW_SELF_SIGNED}
      MAIL_VERIFY_PEER: ${MAIL_VERIFY_PEER}
      MAIL_VERIFY_PEER_NAME: ${MAIL_VERIFY_PEER_NAME}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_SECRET: ${MAILGUN_SECRET}
      MAILGUN_ENDPOINT: ${MAILGUN_ENDPOINT}
      MANDRILL_SECRET: ${MANDRILL_SECRET}
      SPARKPOST_SECRET: ${SPARKPOST_SECRET}
      MAILERSEND_API_KEY: ${MAILERSEND_API_KEY}

      SEND_ERROR_MESSAGE: ${SEND_ERROR_MESSAGE}
      MAP_DEFAULT_LAT: ${MAP_DEFAULT_LAT}
      MAP_DEFAULT_LONG: ${MAP_DEFAULT_LONG}
      MAP_DEFAULT_ZOOM: ${MAP_DEFAULT_ZOOM}
      AUTHENTICATION_GUARD: ${AUTHENTICATION_GUARD}

  db:
    image: postgres:16
    hostname: db
    container_name: firefly_iii_db
    restart: always
    networks:
      - firefly_iii
    volumes:
      - firefly_iii_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}

  cron:
    image: alpine
    restart: always
    container_name: firefly_iii_cron
    environment:
      TZ: ${TZ}
      STATIC_CRON_TOKEN: ${STATIC_CRON_TOKEN}
    command:
      [
        "sh",
        "-c",
        "apk add tzdata && \
        (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
        echo \"0 3 * * * wget -qO- http://app:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo\" \
        | crontab - && \
        crond -f -L /dev/stdout"
      ]
    networks:
      - firefly_iii
    depends_on:
      - app

volumes:
  firefly_iii_upload:
  firefly_iii_db:

networks:
  firefly_iii:
    driver: bridge